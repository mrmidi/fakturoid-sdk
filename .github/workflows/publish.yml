name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish package
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest

      - name: Run ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy src

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish
